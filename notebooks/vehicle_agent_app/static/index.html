<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>EV Connected</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(180deg, #0a0e1a 0%, #1a1f35 50%, #0d1220 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(100,140,255,0.3); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Styles ---
    const styles = {
      app: {
        maxWidth: '430px',
        margin: '0 auto',
        minHeight: '100vh',
        position: 'relative',
        overflow: 'hidden',
      },
      header: {
        padding: '50px 24px 16px',
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
      },
      logo: {
        fontSize: '20px',
        fontWeight: '700',
        letterSpacing: '2px',
        background: 'linear-gradient(135deg, #64b5f6, #42a5f5)',
        WebkitBackgroundClip: 'text',
        WebkitTextFillColor: 'transparent',
      },
      greeting: {
        fontSize: '13px',
        color: 'rgba(255,255,255,0.5)',
        fontWeight: '400',
      },
      vehicleCard: {
        margin: '8px 24px',
        background: 'linear-gradient(145deg, rgba(30,40,70,0.9), rgba(20,28,50,0.95))',
        borderRadius: '24px',
        padding: '28px',
        border: '1px solid rgba(100,180,246,0.15)',
        boxShadow: '0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05)',
        position: 'relative',
        overflow: 'hidden',
      },
      vehicleGlow: {
        position: 'absolute',
        top: '-50%',
        right: '-30%',
        width: '200px',
        height: '200px',
        background: 'radial-gradient(circle, rgba(66,165,245,0.08) 0%, transparent 70%)',
        borderRadius: '50%',
      },
      modelName: {
        fontSize: '22px',
        fontWeight: '600',
        marginBottom: '4px',
        letterSpacing: '0.5px',
      },
      vehicleId: {
        fontSize: '12px',
        color: 'rgba(255,255,255,0.4)',
        marginBottom: '20px',
        letterSpacing: '1px',
      },
      batteryRing: {
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        gap: '24px',
        margin: '16px 0',
      },
      batteryCircle: {
        width: '110px',
        height: '110px',
        borderRadius: '50%',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        border: '3px solid rgba(100,180,246,0.3)',
        background: 'rgba(10,20,40,0.5)',
        position: 'relative',
      },
      batteryPct: {
        fontSize: '32px',
        fontWeight: '700',
        color: '#64b5f6',
      },
      batteryLabel: {
        fontSize: '10px',
        color: 'rgba(255,255,255,0.5)',
        textTransform: 'uppercase',
        letterSpacing: '1px',
      },
      statGrid: {
        display: 'grid',
        gridTemplateColumns: '1fr 1fr',
        gap: '12px',
        flex: 1,
      },
      statItem: {
        background: 'rgba(255,255,255,0.03)',
        borderRadius: '12px',
        padding: '12px',
        border: '1px solid rgba(255,255,255,0.05)',
      },
      statValue: {
        fontSize: '18px',
        fontWeight: '600',
        color: '#e0e0e0',
      },
      statLabel: {
        fontSize: '10px',
        color: 'rgba(255,255,255,0.4)',
        marginTop: '2px',
        textTransform: 'uppercase',
        letterSpacing: '0.5px',
      },
      // Chat
      chatSection: {
        margin: '16px 24px 100px',
      },
      chatTitle: {
        fontSize: '16px',
        fontWeight: '600',
        marginBottom: '12px',
        display: 'flex',
        alignItems: 'center',
        gap: '8px',
      },
      messagesContainer: {
        maxHeight: '320px',
        overflowY: 'auto',
        display: 'flex',
        flexDirection: 'column',
        gap: '10px',
        paddingBottom: '12px',
      },
      msgUser: {
        alignSelf: 'flex-end',
        background: 'linear-gradient(135deg, #1565c0, #1976d2)',
        borderRadius: '18px 18px 4px 18px',
        padding: '10px 16px',
        maxWidth: '80%',
        fontSize: '14px',
        lineHeight: '1.4',
      },
      msgBot: {
        alignSelf: 'flex-start',
        background: 'rgba(255,255,255,0.06)',
        borderRadius: '18px 18px 18px 4px',
        padding: '10px 16px',
        maxWidth: '85%',
        fontSize: '14px',
        lineHeight: '1.5',
        border: '1px solid rgba(255,255,255,0.08)',
      },
      msgSource: {
        fontSize: '10px',
        color: 'rgba(100,180,246,0.7)',
        marginTop: '4px',
      },
      inputBar: {
        position: 'fixed',
        bottom: '0',
        left: '50%',
        transform: 'translateX(-50%)',
        width: '100%',
        maxWidth: '430px',
        padding: '12px 24px 28px',
        background: 'linear-gradient(0deg, #0a0e1a 60%, transparent)',
      },
      inputRow: {
        display: 'flex',
        gap: '8px',
        alignItems: 'center',
      },
      input: {
        flex: 1,
        background: 'rgba(255,255,255,0.07)',
        border: '1px solid rgba(255,255,255,0.12)',
        borderRadius: '24px',
        padding: '12px 20px',
        color: '#fff',
        fontSize: '14px',
        outline: 'none',
        transition: 'border 0.2s',
      },
      sendBtn: {
        width: '42px',
        height: '42px',
        borderRadius: '50%',
        background: 'linear-gradient(135deg, #1565c0, #42a5f5)',
        border: 'none',
        color: '#fff',
        fontSize: '18px',
        cursor: 'pointer',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        transition: 'transform 0.2s',
      },
      quickActions: {
        display: 'flex',
        gap: '8px',
        overflowX: 'auto',
        padding: '8px 0',
        marginBottom: '8px',
      },
      quickBtn: {
        whiteSpace: 'nowrap',
        background: 'rgba(255,255,255,0.05)',
        border: '1px solid rgba(100,180,246,0.2)',
        borderRadius: '20px',
        padding: '8px 14px',
        fontSize: '12px',
        color: 'rgba(255,255,255,0.7)',
        cursor: 'pointer',
        transition: 'all 0.2s',
      },
      loading: {
        display: 'flex',
        gap: '4px',
        padding: '12px 16px',
      },
      dot: {
        width: '6px',
        height: '6px',
        borderRadius: '50%',
        background: 'rgba(100,180,246,0.6)',
        animation: 'pulse 1.2s infinite',
      },
    };

    // --- App Component ---
    function App() {
      const [vehicle, setVehicle] = useState(null);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const messagesRef = useRef(null);

      useEffect(() => {
        fetch('/api/vehicle/V-002')
          .then(r => r.json())
          .then(setVehicle)
          .catch(() => setVehicle({
            vehicle_id: 'V-002', model: 'EV-Accord',
            battery_pct: 78.5, range_km: 312, battery_temp_c: 28.3,
            last_trip_km: 42.7, efficiency_kwh_per_km: 0.168
          }));
      }, []);

      useEffect(() => {
        if (messagesRef.current) {
          messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
        }
      }, [messages]);

      const sendMessage = async (text) => {
        const msg = text || input;
        if (!msg.trim()) return;
        setInput('');
        setMessages(prev => [...prev, { role: 'user', text: msg }]);
        setLoading(true);
        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg })
          });
          const data = await res.json();
          setMessages(prev => [...prev, {
            role: 'bot',
            text: data.answer,
            source: data.source,
            latency: data.latency_sec
          }]);
        } catch (e) {
          setMessages(prev => [...prev, { role: 'bot', text: '接続エラーが発生しました', source: 'error' }]);
        }
        setLoading(false);
      };

      const quickQuestions = [
        '電費最良の車種は？',
        '平均走行距離',
        'バッテリー温度傾向',
        '充電のコツ',
      ];

      return (
        <div style={styles.app}>
          {/* Header */}
          <div style={styles.header}>
            <div style={styles.logo}>EV CONNECTED</div>
            <div style={styles.greeting}>Good Evening</div>
          </div>

          {/* Vehicle Card */}
          {vehicle && (
            <div style={styles.vehicleCard}>
              <div style={styles.vehicleGlow}></div>
              <div style={styles.modelName}>{vehicle.model}</div>
              <div style={styles.vehicleId}>{vehicle.vehicle_id} ・ 2024</div>
              <div style={styles.batteryRing}>
                <div style={styles.batteryCircle}>
                  <div style={styles.batteryPct}>{Math.round(vehicle.battery_pct)}%</div>
                  <div style={styles.batteryLabel}>Battery</div>
                </div>
                <div style={styles.statGrid}>
                  <div style={styles.statItem}>
                    <div style={styles.statValue}>{Math.round(vehicle.range_km)} km</div>
                    <div style={styles.statLabel}>航続距離</div>
                  </div>
                  <div style={styles.statItem}>
                    <div style={styles.statValue}>{vehicle.battery_temp_c}°C</div>
                    <div style={styles.statLabel}>バッテリー温度</div>
                  </div>
                  <div style={styles.statItem}>
                    <div style={styles.statValue}>{vehicle.last_trip_km} km</div>
                    <div style={styles.statLabel}>最終走行</div>
                  </div>
                  <div style={styles.statItem}>
                    <div style={styles.statValue}>{(vehicle.efficiency_kwh_per_km * 1000).toFixed(0)} Wh</div>
                    <div style={styles.statLabel}>/km 電費</div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Chat */}
          <div style={styles.chatSection}>
            <div style={styles.chatTitle}>
              <span>💬</span> AI アシスタント
            </div>

            <div style={styles.quickActions}>
              {quickQuestions.map((q, i) => (
                <div key={i} style={styles.quickBtn} onClick={() => sendMessage(q)}>{q}</div>
              ))}
            </div>

            <div ref={messagesRef} style={styles.messagesContainer}>
              {messages.map((m, i) => (
                <div key={i} style={m.role === 'user' ? styles.msgUser : styles.msgBot}>
                  {m.text}
                  {m.source && (
                    <div style={styles.msgSource}>
                      {m.source === 'Genie' ? '📊' : '🧠'} {m.source} ・ {m.latency}s
                    </div>
                  )}
                </div>
              ))}
              {loading && (
                <div style={{...styles.msgBot, ...styles.loading}}>
                  <div style={{...styles.dot, animationDelay: '0s'}}></div>
                  <div style={{...styles.dot, animationDelay: '0.2s'}}></div>
                  <div style={{...styles.dot, animationDelay: '0.4s'}}></div>
                </div>
              )}
            </div>
          </div>

          {/* Input */}
          <div style={styles.inputBar}>
            <div style={styles.inputRow}>
              <input
                style={styles.input}
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && !e.nativeEvent.isComposing && sendMessage()}
                placeholder="車両について質問..."
              />
              <button style={styles.sendBtn} onClick={() => sendMessage()}>↑</button>
            </div>
          </div>

          <style>{`
            @keyframes pulse {
              0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
              40% { opacity: 1; transform: scale(1.2); }
            }
          `}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
